<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acompanhar Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
:root {
  --green:#22c55e;--green-dk:#16a34a;--green-lt:#f0fdf4;--green-bd:#bbf7d0;
  --ink:#18181b;--ink-2:#3f3f46;--muted:#71717a;--subtle:#a1a1aa;
  --bg:#f8fafc;--surface:#fff;--surface-2:#f4f4f5;--border:#e4e4e7;--border-lt:#f0f0f0;
  --danger:#ef4444;--warn:#f59e0b;--info:#3b82f6;--purple:#6366f1;
  --r-sm:8px;--r:12px;--r-lg:18px;--r-xl:24px;
  --sh-xs:0 1px 2px rgba(0,0,0,0.05);--sh-sm:0 2px 8px rgba(0,0,0,0.07);
  --sh-md:0 8px 30px rgba(0,0,0,0.1);
  --font-d:'Plus Jakarta Sans',sans-serif;--font-b:'Inter',sans-serif;
  --t:0.15s ease;--ease:cubic-bezier(0.32,0.72,0,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);min-height:100dvh;-webkit-font-smoothing:antialiased}

.header{background:#0f172a;padding:14px 20px;display:flex;align-items:center;gap:10px}
.header-logo{width:34px;height:34px;background:var(--green);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.header-name{font-family:var(--font-d);font-size:0.95rem;font-weight:800;color:#fff}
.header-sub{font-size:0.68rem;color:rgba(255,255,255,0.35);margin-top:1px}

.page{max-width:480px;margin:0 auto;padding:24px 20px 60px}

/* BUSCA */
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);margin-bottom:20px}
.search-title{font-family:var(--font-d);font-size:1rem;font-weight:800;color:var(--ink);margin-bottom:4px}
.search-sub{font-size:0.8rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
.search-row{display:flex;gap:8px}
.search-input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-b);font-size:0.9rem;outline:none;transition:border-color var(--t)}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,0.1)}
.search-input::placeholder{color:#b0b0b8}
.btn-search{padding:10px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--font-d);font-size:0.84rem;font-weight:700;cursor:pointer;transition:background var(--t);white-space:nowrap}
.btn-search:hover{background:var(--green-dk)}
.search-error{font-size:0.78rem;color:var(--danger);margin-top:8px;display:none}

/* RESULTADO */
.order-result{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-md);display:none}

.result-header{padding:16px 20px;border-bottom:1px solid var(--border-lt);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.result-num{font-family:var(--font-d);font-size:1.1rem;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.result-time{font-size:0.73rem;color:var(--muted);margin-top:2px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-family:var(--font-d);font-size:0.76rem;font-weight:800;text-transform:uppercase;letter-spacing:0.04em}

/* TIMELINE */
.timeline{padding:20px}
.timeline-step{display:flex;gap:14px;position:relative}
.timeline-step:not(:last-child)::after{content:'';position:absolute;left:14px;top:32px;width:2px;height:calc(100% - 8px);background:var(--border)}
.step-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;border:2px solid var(--border);background:var(--surface-2);z-index:1;transition:all 0.3s}
.step-icon.done{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 0 4px rgba(34,197,94,0.15)}
.step-icon.active{background:#fff;border-color:var(--green);color:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,0.12);animation:stepPulse 2s ease infinite}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,0.12)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0.06)}}
.step-body{flex:1;padding-bottom:20px}
.step-label{font-family:var(--font-d);font-size:0.86rem;font-weight:700;color:var(--ink-2);margin-bottom:2px}
.step-label.active-label{color:var(--green-dk)}
.step-label.done-label{color:var(--ink)}
.step-time{font-size:0.71rem;color:var(--muted)}

/* RESUMO */
.result-summary{padding:16px 20px;border-top:1px solid var(--border-lt)}
.summary-title{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.summary-item{display:flex;justify-content:space-between;font-size:0.82rem;padding:3px 0}
.summary-item span{color:var(--muted)}
.summary-item strong{color:var(--ink);font-weight:600}
.summary-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--border-lt);margin-top:6px}
.summary-total span{font-family:var(--font-d);font-size:0.85rem;font-weight:700;color:var(--ink)}
.summary-total strong{font-family:var(--font-d);font-size:1rem;font-weight:800;color:var(--ink)}

.result-footer{padding:14px 20px;background:var(--surface-2);border-top:1px solid var(--border-lt);display:flex;align-items:center;justify-content:space-between;gap:8px}
.result-footer-label{font-size:0.74rem;color:var(--muted)}
.btn-refresh{padding:7px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-family:var(--font-d);font-size:0.76rem;font-weight:700;color:var(--ink-2);cursor:pointer;transition:all var(--t)}
.btn-refresh:hover{background:var(--border)}

.live-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--green-lt);border:1px solid var(--green-bd);border-radius:99px;font-family:var(--font-d);font-size:0.68rem;font-weight:700;color:var(--green-dk)}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo" id="h-logo">🍕</div>
  <div><div class="header-name" id="h-name">Acompanhar Pedido</div><div class="header-sub" id="h-sub">Veja o status em tempo real</div></div>
</div>

<div class="page">

  <div class="search-box">
    <div class="search-title">Rastrear pedido 🔍</div>
    <div class="search-sub">Digite o número do seu pedido para acompanhar em tempo real.</div>
    <div class="search-row">
      <input type="text" class="search-input" id="order-input" placeholder="Ex: 0042" maxlength="10" inputmode="numeric"/>
      <button class="btn-search" id="btn-search">Buscar</button>
    </div>
    <div class="search-error" id="search-error">Pedido não encontrado. Verifique o número.</div>
  </div>

  <div class="order-result" id="order-result">

    <div class="result-header">
      <div>
        <div class="result-num" id="res-num">Pedido 0042</div>
        <div class="result-time" id="res-time"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="status-badge" id="res-badge"></span>
        <span class="live-pill"><span class="live-dot"></span>Ao vivo</span>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="result-summary" id="res-summary"></div>

    <div class="result-footer">
      <div class="result-footer-label" id="res-footer-label">Atualiza automaticamente</div>
      <button class="btn-refresh" id="btn-refresh">↻ Atualizar</button>
    </div>

  </div>

</div>

<script src="config.js"></script>
<script src="supabase.js"></script>
<script>
let currentOrderId = null;
let realtimeEs     = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("h-logo").textContent = CONFIG.store.logo || "🍕";
  document.getElementById("h-name").textContent = CONFIG.store.name;
  document.getElementById("h-sub").textContent  = "Acompanhe seu pedido em tempo real";

  document.getElementById("btn-search").addEventListener("click", buscarPedido);
  document.getElementById("btn-refresh").addEventListener("click", () => {
    if (currentOrderId) carregarPedido(currentOrderId);
  });
  document.getElementById("order-input").addEventListener("keydown", e => {
    if (e.key === "Enter") buscarPedido();
  });

  // Auto-preenche se veio por URL: ?pedido=0042
  const params = new URLSearchParams(location.search);
  const num    = params.get("pedido");
  if (num) {
    document.getElementById("order-input").value = num;
    buscarPedido();
  }
});

async function buscarPedido() {
  const num = document.getElementById("order-input").value.trim().replace(/\D/g,"").padStart(4,"0");
  if (!num) return;

  document.getElementById("search-error").style.display = "none";
  document.getElementById("btn-search").textContent = "...";

  try {
    const data = await sb.select("orders", `order_number=eq.${num}&store_id=eq.default&limit=1`);
    if (!data || data.length === 0) {
      document.getElementById("search-error").style.display = "block";
      document.getElementById("order-result").style.display = "none";
    } else {
      mostrarPedido(data[0]);
      iniciarRealtime(data[0].id);
    }
  } catch {
    document.getElementById("search-error").textContent = "Erro de conexão. Tente novamente.";
    document.getElementById("search-error").style.display = "block";
  }

  document.getElementById("btn-search").textContent = "Buscar";
}

async function carregarPedido(id) {
  try {
    const data = await sb.select("orders", `id=eq.${id}&limit=1`);
    if (data && data[0]) mostrarPedido(data[0]);
  } catch {}
}

function mostrarPedido(order) {
  currentOrderId = order.id;
  const st = ORDER_STATUS[order.status] || ORDER_STATUS.received;
  const payLabels = {pix:"Pix",credito:"Cartão de Crédito",debito:"Cartão de Débito",dinheiro:"Dinheiro"};

  document.getElementById("res-num").textContent   = `Pedido ${order.order_number}`;
  document.getElementById("res-time").textContent  = `Recebido ${timeAgo(order.created_at)}`;
  document.getElementById("res-badge").textContent = `${st.emoji} ${st.label}`;
  document.getElementById("res-badge").style.cssText = `background:${st.color}18;color:${st.color}`;

  // Timeline
  const currentIdx = STATUS_FLOW.indexOf(order.status);
  const history    = order.status_history || [];

  const steps = STATUS_FLOW.filter(s => s !== "cancelled").map((s, idx) => {
    const info      = ORDER_STATUS[s];
    const isDone    = idx < currentIdx || order.status === s;
    const isActive  = order.status === s;
    const histEntry = history.find(h => h.to === s);
    const timeStr   = histEntry ? timeAgo(histEntry.at) : (s === "received" ? timeAgo(order.created_at) : "");

    return `
    <div class="timeline-step">
      <div class="step-icon ${isDone && !isActive ? "done" : isActive ? "active" : ""}">
        ${isDone || isActive ? info.emoji : "○"}
      </div>
      <div class="step-body">
        <div class="step-label ${isActive ? "active-label" : isDone ? "done-label" : ""}">${info.label}</div>
        ${timeStr ? `<div class="step-time">${timeStr}</div>` : ""}
      </div>
    </div>`;
  });

  if (order.status === "cancelled") {
    steps.push(`
    <div class="timeline-step">
      <div class="step-icon" style="background:#fef2f2;border-color:#ef4444;color:#ef4444">❌</div>
      <div class="step-body"><div class="step-label" style="color:#ef4444">Cancelado</div></div>
    </div>`);
  }

  document.getElementById("timeline").innerHTML = steps.join("");

  // Resumo
  const items = Array.isArray(order.items) ? order.items : [];
  document.getElementById("res-summary").innerHTML = `
    <div class="summary-title">Resumo do pedido</div>
    ${items.map(i => `<div class="summary-item"><span>${i.quantity}× ${i.name}</span><strong>${fmt(i.price * i.quantity)}</strong></div>`).join("")}
    ${order.delivery_fee > 0 ? `<div class="summary-item"><span>🛵 Taxa de entrega</span><strong>${fmt(order.delivery_fee)}</strong></div>` : ""}
    <div class="summary-total"><span>Total</span><strong>${fmt(order.grand_total)}</strong></div>
    <div style="margin-top:10px;font-size:0.78rem;color:var(--muted)">
      💳 ${payLabels[order.payment_method] || order.payment_method || "—"}
      ${order.payment_change ? ` · troco para ${fmt(order.payment_change)}` : ""}
    </div>
  `;

  document.getElementById("order-result").style.display = "block";
  document.getElementById("order-result").scrollIntoView({behavior:"smooth",block:"nearest"});
}

function iniciarRealtime(id) {
  if (realtimeEs) realtimeEs.close();
  try {
    realtimeEs = sb.subscribe("orders", payload => {
      if (payload.type==="UPDATE" && payload.record?.id===id) {
        mostrarPedido(payload.record);
      }
    });
  } catch {}
}

function fmt(v) { return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function timeAgo(iso) {
  const diff = Date.now()-new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if(m<1)  return "agora mesmo";
  if(m<60) return `há ${m} min`;
  const h = Math.floor(m/60);
  if(h<24) return `há ${h}h`;
  return `há ${Math.floor(h/24)}d`;
}
</script>
</body>
</html>
